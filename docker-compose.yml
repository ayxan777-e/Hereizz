version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    container_name: hereizzz-api
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db;Database=HereizzzDb;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True;Encrypt=False"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hereizzz-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Pass123"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: